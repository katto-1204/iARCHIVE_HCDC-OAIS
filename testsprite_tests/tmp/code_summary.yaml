version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite 7
  - TailwindCSS 4
  - TanStack React Query
  - Wouter (client-side routing)
  - Framer Motion
  - Radix UI
  - Lucide React
  - date-fns
routes:
  - path: /
    file: src/pages/Home.tsx
    auth_required: false
    description: Landing page with hero, featured collections, feature cards, access levels, and CTA
  - path: /login
    file: src/pages/Login.tsx
    auth_required: false
    description: Email/password login form with demo credentials support
  - path: /register
    file: src/pages/Register.tsx
    auth_required: false
    description: Account registration form requiring admin approval
  - path: /collections
    file: src/pages/Collections.tsx
    auth_required: false
    description: Public browsable archive with search, filters, grid/list view, OAIS toggle
  - path: /materials/:id
    file: src/pages/MaterialDetail.tsx
    auth_required: false
    description: Full material detail view with multi-page viewer, metadata tabs, access control
  - path: /about
    file: src/pages/About.tsx
    auth_required: false
    description: About OAIS educational page
  - path: /terms
    file: src/pages/Terms.tsx
    auth_required: false
    description: Terms of service page
  - path: /request-access
    file: src/pages/RequestAccess.tsx
    auth_required: false
    description: Form to petition access to restricted materials
  - path: /admin
    file: src/pages/admin/Dashboard.tsx
    auth_required: true
    description: Admin metadata compliance dashboard with charts, stat cards, materials table, activity feed
  - path: /admin/collections
    file: src/pages/admin/Materials.tsx
    auth_required: true
    description: Full material management with hierarchy tree, ingestion workflow, metadata editing, export
  - path: /admin/requests
    file: src/pages/admin/Requests.tsx
    auth_required: true
    description: Review and approve/reject material access requests
  - path: /admin/audit
    file: src/pages/admin/AuditLogs.tsx
    auth_required: true
    description: System-wide activity and audit log viewer
  - path: /admin/users
    file: src/pages/admin/Users.tsx
    auth_required: true
    description: User management with pending registration approval
  - path: /admin/categories
    file: src/pages/admin/Categories.tsx
    auth_required: true
    description: CRUD for collection categories/series
  - path: /admin/announcements
    file: src/pages/admin/Announcements.tsx
    auth_required: true
    description: System announcement management
  - path: /archivist
    file: src/pages/archivist/Dashboard.tsx
    auth_required: true
    description: Archivist-specific dashboard
  - path: /student
    file: src/pages/student/Dashboard.tsx
    auth_required: true
    description: Student dashboard for browsing accessible materials
features:
  - name: User Login
    description: Login with email and password, receives JWT token stored in localStorage
    files:
      - src/pages/Login.tsx
      - src/App.tsx
    entry_route: /login
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
      - See error message on invalid credentials
      - Redirected to role-based dashboard on success
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: User Registration
    description: Register new account with name, email, password, institution, role selection
    files:
      - src/pages/Register.tsx
    entry_route: /register
    user_interactions:
      - Fill name input field
      - Fill email input field
      - Fill password input field
      - Select institution
      - Select role/user category
      - Click Register button
      - See confirmation that registration is pending approval
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Browse Collections
    description: Search and filter archival materials with grid/list view toggle, OAIS compliance filter
    files:
      - src/pages/Collections.tsx
      - src/data/storage.ts
      - src/data/metadataUtils.ts
    entry_route: /collections
    user_interactions:
      - Type in search bar to filter materials by title, creator, or ID
      - Toggle OAIS Only checkbox to filter compliant materials
      - Click Filters button to show access level and category filters
      - Select access level filter (Public/Restricted/Confidential)
      - Toggle between grid and list view
      - Click on material card to navigate to detail page
      - Clear all filters button
    api_calls:
      - method: GET
        endpoint: /api/categories
    auth_required: false
  - name: View Material Detail
    description: Full archival record view with multi-page document viewer, ISAD(G) metadata, Dublin Core tab
    files:
      - src/pages/MaterialDetail.tsx
      - src/data/storage.ts
    entry_route: /materials/:id
    user_interactions:
      - Navigate through page thumbnails
      - Click zoom in/out buttons
      - Click rotate button
      - Click fullscreen button to view document
      - Navigate pages in fullscreen with arrows
      - Switch between Details, Dublin Core, and Related Items tabs
      - Click Download Metadata button to export CSV
      - Click Request Access button for restricted materials
    api_calls:
      - method: GET
        endpoint: /api/requests
    auth_required: false
  - name: Admin Dashboard
    description: Metadata compliance overview with charts, stat cards, materials table, activity feed
    files:
      - src/pages/admin/Dashboard.tsx
      - src/data/metadataUtils.ts
      - src/data/sampleData.ts
      - src/components/CompletionRing.tsx
      - src/components/Barcode.tsx
    entry_route: /admin
    user_interactions:
      - View ingestion velocity chart
      - View stat cards (Total Materials, Fully Described, Essential Compliance, Avg Completion)
      - Click filter tabs (All, Complete, Partial, Incomplete)
      - Click on material row to expand detail panel
      - View ISAD(G) area breakdown bars
      - View essential fields checklist
      - View completion rings for ISAD(G) and Dublin Core
      - View full metadata table with all 36 fields
      - Scroll through activity feed
    api_calls: []
    auth_required: true
  - name: Material Ingestion
    description: Upload and catalog new archival materials through a 4-step workflow
    files:
      - src/pages/admin/Materials.tsx
      - src/data/storage.ts
    entry_route: /admin/collections
    user_interactions:
      - Click Ingest New Material button
      - Select department/subfonds from hierarchy dropdown
      - Select series from dropdown
      - Enter material title
      - Enter creator name
      - Upload file (PDF, DOCX, XLSX, images, video)
      - Wait for processing (OCR, text extraction, page preview generation)
      - Review page preview thumbnails
      - Navigate through previewed pages
      - Select access level (Public, Restricted, Confidential)
      - Enter Terms of Use text
      - Review metadata checklist
      - Click Finalize Ingest button
    api_calls: []
    auth_required: true
  - name: Export Metadata
    description: Download metadata as CSV for individual materials or batch export of filtered materials
    files:
      - src/pages/admin/Materials.tsx
      - src/pages/MaterialDetail.tsx
    entry_route: /admin/collections
    user_interactions:
      - Click Export Metadata button in admin toolbar for batch CSV download
      - Click Download Metadata button on individual material for single-item CSV
    api_calls: []
    auth_required: false
  - name: Material Search and Filter (Admin)
    description: Search, filter by hierarchy, and paginate through materials in admin view
    files:
      - src/pages/admin/Materials.tsx
      - src/components/ArchivalTree.tsx
    entry_route: /admin/collections
    user_interactions:
      - Type in search input to filter by title, ID, or creator
      - Click tree nodes in hierarchy browser to filter by department/series
      - Click pagination controls to navigate pages
      - Click material row to expand accordion detail view
      - Click Edit Material button on expanded material
      - Click Delete button (X icon) to remove a material
      - Click External Link icon to open public detail page
    api_calls: []
    auth_required: true
  - name: Access Request Management
    description: Review access requests from researchers, approve or reject them
    files:
      - src/pages/admin/Requests.tsx
    entry_route: /admin/requests
    user_interactions:
      - View list of pending access requests
      - Click Approve button on a request
      - Click Reject button on a request
    api_calls:
      - method: GET
        endpoint: /api/requests
      - method: POST
        endpoint: /api/requests/:id/approve
      - method: POST
        endpoint: /api/requests/:id/reject
    auth_required: true
  - name: User Management
    description: View active users and process pending registration approvals
    files:
      - src/pages/admin/Users.tsx
    entry_route: /admin/users
    user_interactions:
      - View list of active users
      - View pending registration requests
      - Click Approve button on pending user
      - Click Reject button on pending user
    api_calls:
      - method: GET
        endpoint: /api/users
      - method: POST
        endpoint: /api/admin/approve-user
      - method: POST
        endpoint: /api/admin/reject-user
    auth_required: true
  - name: Category Management
    description: CRUD operations for collection categories/series
    files:
      - src/pages/admin/Categories.tsx
    entry_route: /admin/categories
    user_interactions:
      - View list of categories
      - Click Add Category button
      - Fill category name and description
      - Click Save to create category
      - Click Edit on existing category
      - Click Delete on existing category
    api_calls:
      - method: GET
        endpoint: /api/categories
      - method: POST
        endpoint: /api/categories
      - method: PATCH
        endpoint: /api/categories/:id
      - method: DELETE
        endpoint: /api/categories/:id
    auth_required: true
  - name: Announcement Management
    description: Create and manage system-wide announcements
    files:
      - src/pages/admin/Announcements.tsx
    entry_route: /admin/announcements
    user_interactions:
      - View list of announcements
      - Click Create Announcement button
      - Fill announcement title and content
      - Toggle active/inactive
      - Click Save
      - Click Delete on existing announcement
    api_calls:
      - method: GET
        endpoint: /api/announcements
      - method: POST
        endpoint: /api/announcements
      - method: DELETE
        endpoint: /api/announcements/:id
    auth_required: true
  - name: Splash Screen
    description: Animated loading splash on first visit per browser session
    files:
      - src/App.tsx
    entry_route: /
    user_interactions:
      - Wait for progress bar to complete
      - Automatic transition to main content
    api_calls: []
    auth_required: false
known_limitations:
  - issue: All data persistence uses browser localStorage, not a real database
    location: src/data/storage.ts
    impact: Data is lost if localStorage is cleared; quota limits apply for large files
  - issue: Mock API runs only in Vite dev mode, not in production builds
    location: vite.config.ts (mockAuthPlugin)
    impact: All /api/* endpoints return 404 in production unless a real backend is deployed
  - issue: PDF page preview extraction limited to first 10 pages to avoid localStorage quota
    location: src/pages/admin/Materials.tsx
    impact: Documents with more than 10 pages only show first 10 visual thumbnails
  - issue: Admin Dashboard uses hardcoded SAMPLE_MATERIALS instead of localStorage data
    location: src/pages/admin/Dashboard.tsx (line 52)
    impact: Dashboard stats do not reflect newly ingested materials, only the 6 sample items
  - issue: Audit Logs page returns empty data from mock API
    location: vite.config.ts (line 384)
    impact: Audit log page shows no entries
  - issue: file:// workspace dependencies may fail on Vercel install step
    location: artifacts/iarchive/package.json (lines 52-53)
    impact: Vercel build may fail during pnpm install if workspace resolution is misconfigured
