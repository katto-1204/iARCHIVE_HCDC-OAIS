kind = "web"
previewPath = "/"
title = "iArchive - HCDC Digital Archival Collection System"
version = "1.0.0"
id = "artifacts/iarchive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24485

[services.development]
run = "pnpm --filter @workspace/iarchive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iarchive", "run", "build" ]
publicDir = "artifacts/iarchive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24485"
BASE_PATH = "/"
